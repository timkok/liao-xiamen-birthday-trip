name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build site
        env:
          GITHUB_PAGES: "true"
        run: npm run build
      - name: Render homepage
        env:
          GITHUB_PAGES: "true"
        run: |
          npm run start > /tmp/xiamen-trip-site.log 2>&1 &
          server_pid=$!
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/ > /tmp/index.html; then
              break
            fi
            sleep 1
          done
          kill "$server_pid" || true
          test -s /tmp/index.html
          mkdir -p site
          cp -R dist/client/. site/
          cp /tmp/index.html site/index.html
          touch site/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
